---
# ATLAS CAPITAL — Akash Monte Carlo simulation worker
# Deploy via https://console.akash.network/
version: "2.0"

services:
  atlas-sim:
    image: ghcr.io/atlas-capital/sim-worker:latest
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
    env:
      - WORKER_NAME=atlas-monte-carlo
      - N_SIMS=5000

profiles:
  compute:
    atlas-sim:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 1Gi
        storage:
          size: 1Gi
  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - akash1365yvmc4s7fdkdyejau32du9mq47ndc48vtwd2
      pricing:
        atlas-sim:
          denom: uakt
          amount: 10000

deployment:
  atlas-sim:
    akash:
      profile: atlas-sim
      count: 1
